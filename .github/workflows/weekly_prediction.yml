name: TTC Daily Prediction Update

on:

  workflow_dispatch:

  schedule:
    # Every day at 3 AM Toronto time (7 AM UTC)
    - cron: '0 7 * * *'


jobs:

  predict:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Check files
        run: |
          ls -R


      - name: Run TTC prediction
        run: |
          python weekly_prediction.py


      - name: Commit prediction output
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add output/predicted_dataset.parquet

          git diff --cached --quiet || git commit -m "Daily TTC prediction update"

          git push