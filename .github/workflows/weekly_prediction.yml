name: TTC Daily Prediction Update

on:

  workflow_dispatch:

  schedule:
    # Run every day at 3 AM Toronto time (7 AM UTC)
    - cron: '0 7 * * *'


jobs:

  predict:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter nbconvert


      - name: Check Repository Files
        run: |
          ls -R


      - name: Run TTC Prediction Notebook
        run: |
          jupyter nbconvert \
          --to notebook \
          --execute weekly_prediction.ipynb \
          --output executed_weekly_prediction.ipynb


      - name: Commit Updated Prediction File
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add output/predicted_dataset.parquet

          git diff --cached --quiet || git commit -m "Daily TTC prediction update"

          git push