name: Weekly TTC Prediction

on:
  workflow_dispatch:

  schedule:
    - cron: '0 7 * * *'    # Every day at ~3 AM Toronto (during EDT)

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Pipeline
        run: |
          python scripts/data_pipeline.py

      - name: Generate Predictions
        run: |
          python scripts/weekly_prediction.py

      - name: Commit updated predictions
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/output/predictions_weekly.csv

          git diff --cached --quiet || git commit -m "Daily prediction update"

          git push